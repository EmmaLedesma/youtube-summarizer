# ═══════════════════════════════════════════════════════════
# YT Summarizer — Deploy Frontend
# .github/workflows/deploy-frontend.yml
#
# Se ejecuta en cada push a master que modifique el frontend.
# Sube los archivos a S3 e invalida CloudFront.
# ═══════════════════════════════════════════════════════════

name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'

  workflow_dispatch:

jobs:
  deploy:
    name: S3 Sync + CloudFront Invalidation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://yt-summarizer-dev-frontend \
            --delete \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E16INCGHSKTQTT \
            --paths "/*"

      - name: Print frontend URL
        run: echo "Frontend deployed → https://d21n43yg7hlxxz.cloudfront.net"